name: CI

on:
  push:
    branches: [SPRING_BOOT]
  pull_request:
    branches: [SPRING_BOOT]

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: LinkUp

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: linkup
          POSTGRES_PASSWORD: linkup
          POSTGRES_DB: linkup
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U linkup -d linkup"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/linkup
      SPRING_DATASOURCE_USERNAME: linkup
      SPRING_DATASOURCE_PASSWORD: linkup
      SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/linkup
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: LinkUp/pom.xml

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Tests
        run: ./mvnw -B -ntp test

      - name: Build
        run: ./mvnw -B -ntp package -DskipTests
