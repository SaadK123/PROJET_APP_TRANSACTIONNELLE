name: CI

on:
  push:
    branches: [SPRING_BOOT]

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: LinkUp

    env:
      SPRING_DATASOURCE_URL: ${{ secrets.AIVEN_JDBC_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.AIVEN_DB_USER }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.AIVEN_DB_PASSWORD }}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: LinkUp/pom.xml

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Verify secrets exist
        run: |
          if [ -z "$SPRING_DATASOURCE_URL" ]; then
            echo "AIVEN_JDBC_URL is missing"
            exit 1
          fi
          echo "Secrets loaded correctly"

      - name: Tests
        run: ./mvnw -B -ntp test

      - name: Build
        run: ./mvnw -B -ntp package -DskipTests
